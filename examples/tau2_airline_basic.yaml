# τ²-Bench airline — dual-control mode (PR 2)
#
# Runs the upstream-faithful dual-control loop: a user simulator and a
# customer-service assistant alternate via round-robin scheduling with
# the ``peer_messages`` observation mode. The loop halts when the user
# simulator emits any of ``###STOP###`` / ``###TRANSFER###`` /
# ``###OUT-OF-SCOPE###``.
#
# Usage:
#   uv run inspect eval orbit/tau2 \
#     --model openai/gpt-4o \
#     -T domain=airline \
#     -T mode=dual_control \
#     -T max_tasks=5 \
#     -T judge_model=openai/gpt-4.1
#
#   # Named tasks only:
#   uv run inspect eval orbit/tau2 \
#     -T task_ids="1,3,7" \
#     -T mode=dual_control \
#     --model openai/gpt-4o
#
# The ``@task tau2(...)`` entry point builds the ExperimentConfig for
# each sample programmatically from the vendored tau2 tasks.json. This
# YAML is an at-a-glance reference, not a loader input.

name: "tau2_airline_basic"
description: |
  τ²-Bench airline dual-control mode — user simulator ↔ assistant loop,
  peer_messages observation, STOP-sentinel halt, DB / ACTION /
  COMMUNICATE / NL_ASSERTION scoring.

setup:
  agents:
    - name: "user_sim"
      role: "user_simulator"
      tools: []
    - name: "assistant"
      role: "customer_service_agent"
      tools:
        - get_user_details
        - get_reservation_details
        - get_flight_status
        - list_all_airports
        - search_direct_flight
        - search_onestop_flight
        - calculate
        - book_reservation
        - cancel_reservation
        - update_reservation_baggages
        - update_reservation_flights
        - update_reservation_passengers
        - send_certificate
        - transfer_to_human_agents
  edges: []

scenario:
  name: "tau2_airline"
  description: "τ²-Bench airline customer-service scenario (PR 2 dual_control)"

attacks: []
defenses: []

execution:
  scheduling_mode: round_robin
  agent_groups:
    - name: tau2_dual_control
      agents: [user_sim, assistant]
      goal: "Complete the customer request through a dual-control conversation while following domain policy."
  observation:
    mode: peer_messages

scheduler:
  max_turns: 100
  max_time_seconds: 600.0
  halt_on_convergence: false
  custom_halt_conditions:
    - name: tau2_stop_sentinels
      module_path: orbit.scenarios.tau2.halt
      function: check_tau2_stop_sentinels

metadata:
  tau2_domain: airline
  tau2_mode: dual_control
  tau2_upstream_commit: "a11d95e19a049638dd3fd7c5b941a509422452dc"
