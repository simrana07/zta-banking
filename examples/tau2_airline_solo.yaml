# τ²-Bench airline — solo mode (PR 1)
#
# Reproduces the upstream tau2 solo-mode baseline: a single
# customer-service agent receives a ticket (the user scenario rendered
# into its system prompt) and is scored on a deterministic DB diff
# against the gold trajectory.
#
# Usage:
#   uv run inspect eval orbit/tau2 \
#     --model openai/gpt-4o \
#     -T domain=airline \
#     -T mode=solo \
#     -T max_tasks=5
#
#   # Run specific tasks:
#   uv run inspect eval orbit/tau2 \
#     -T task_ids="1,3,7" \
#     --model openai/gpt-4o
#
# The `@task tau2(...)` entry point builds the ExperimentConfig for
# each sample programmatically from the vendored tau2 tasks.json. This
# YAML is an at-a-glance reference, not a loader input.

name: "tau2_airline_solo"
description: |
  τ²-Bench airline solo mode — single customer-service agent with the
  airline tool set, policy inlined into the system prompt, deterministic
  DB / ACTION / COMMUNICATE scoring.

setup:
  agents:
    - name: "assistant"
      role: "customer_service_agent"
      tools:
        - get_user_details
        - get_reservation_details
        - get_flight_status
        - list_all_airports
        - search_direct_flight
        - search_onestop_flight
        - calculate
        - book_reservation
        - cancel_reservation
        - update_reservation_baggages
        - update_reservation_flights
        - update_reservation_passengers
        - send_certificate
        - transfer_to_human_agents
  edges: []

scenario:
  name: "tau2_airline"
  description: "τ²-Bench airline customer-service scenario (PR 1 solo)"

attacks: []
defenses: []

execution:
  scheduling_mode: round_robin
  agent_groups:
    - name: tau2_solo
      agents: [assistant]
      goal: "Complete the customer request while following domain policy."

scheduler:
  max_turns: 100
  max_time_seconds: 600.0
  halt_on_convergence: false

metadata:
  tau2_domain: airline
  tau2_mode: solo
  tau2_upstream_commit: "a11d95e19a049638dd3fd7c5b941a509422452dc"
